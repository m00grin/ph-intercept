name: Publish to GHCR (self-hosted)

on:
  push:
    tags: ["v*"]

jobs:
  build-and-push:
    runs-on: self-hosted

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        run: docker buildx use vega-builder 2>/dev/null || docker buildx create --name vega-builder --driver docker-container --use

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/m00grin/ph-intercept
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.licenses=${{ github.event.repository.license.spdx_id }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/386,linux/arm64,linux/arm/v7,linux/arm/v6,linux/riscv64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=local,src=/opt/buildx-cache/ph-intercept
          cache-to: type=local,dest=/opt/buildx-cache/ph-intercept-new,mode=max
          provenance: mode=max

      - name: Log out of GHCR
        if: always()
        run: docker logout ghcr.io

      - name: Rotate build cache
        run: |
          rm -rf /opt/buildx-cache/ph-intercept
          mkdir -p /opt/buildx-cache
          mv /opt/buildx-cache/ph-intercept-new /opt/buildx-cache/ph-intercept

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          notes=$(awk '/^## \[/{if(found) exit; found=1; next} found{print}' CHANGELOG.md)
          if ! gh release view "${{ github.ref_name }}" --json id -q .id > /dev/null 2>&1; then
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes "$notes"
          fi
