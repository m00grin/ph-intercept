name: Publish develop build

on:
  push:
    branches: ["develop"]
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "SECURITY.md"
      - "LICENSE"
      - "compose.yaml"
      - "adguard/compose.yaml"
      - "adguard/README.md"
      - ".gitattributes"
      - ".gitignore"
      - ".github/FUNDING.yml"
      - ".github/dependabot.yml"
      - ".github/workflows/codeql.yml"
      - ".github/workflows/develop.yml"
      - ".github/workflows/publish.yml"

jobs:
  build-and-push:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/m00grin/ph-intercept
          labels: |
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.licenses=MIT
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/386,linux/arm64,linux/arm/v7,linux/arm/v6,linux/riscv64
          push: true
          tags: ghcr.io/m00grin/ph-intercept:develop
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=local,src=/opt/buildx-cache/ph-intercept
          cache-to: type=local,dest=/opt/buildx-cache/ph-intercept-new,mode=max
          provenance: false

      - name: Rotate build cache
        run: |
          rm -rf /opt/buildx-cache/ph-intercept
          mkdir -p /opt/buildx-cache
          mv /opt/buildx-cache/ph-intercept-new /opt/buildx-cache/ph-intercept
