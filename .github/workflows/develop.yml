name: Publish develop build

on:
  push:
    branches: ["develop"]
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "SECURITY.md"
      - "LICENSE"
      - "compose.yaml"
      - "adguard/compose.yaml"
      - "adguard/README.md"
      - ".gitattributes"
      - ".gitignore"
      - ".github/FUNDING.yml"
      - ".github/dependabot.yml"
      - ".github/workflows/codeql.yml"
      - ".github/workflows/develop.yml"
      - ".github/workflows/publish.yml"

jobs:
  build-and-push:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/m00grin/ph-intercept
          labels: |
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.licenses=${{ github.event.repository.license.spdx_id }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/386,linux/arm64,linux/arm/v7,linux/arm/v6,linux/riscv64
          push: true
          tags: ghcr.io/m00grin/ph-intercept:develop
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=local,src=/opt/buildx-cache/ph-intercept
          cache-to: type=local,dest=/opt/buildx-cache/ph-intercept-new,mode=max
          provenance: false

      - name: Rotate build cache
        run: |
          rm -rf /opt/buildx-cache/ph-intercept
          mkdir -p /opt/buildx-cache
          mv /opt/buildx-cache/ph-intercept-new /opt/buildx-cache/ph-intercept

      - name: Cleanup old untagged develop versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          AUTH=$(curl -sf \
            -u "${OWNER}:${GH_TOKEN}" \
            "https://ghcr.io/token?scope=repository:${OWNER}/ph-intercept:pull&service=ghcr.io" \
            | jq -r .token)
          if [ -z "${AUTH}" ] || [ "${AUTH}" = "null" ]; then
            echo "Failed to obtain GHCR auth token; skipping cleanup."
            exit 0
          fi

          TAGGED=$(gh api --paginate "/users/${OWNER}/packages/container/ph-intercept/versions" \
            --jq '.[] | select(.metadata.container.tags | length > 0) | .name')
          if [ -z "${TAGGED}" ]; then
            echo "No tagged versions found; skipping cleanup."
            exit 0
          fi

          PROTECTED=$(
            printf '%s\n' "${TAGGED}" \
            | while read -r DIGEST; do
                MANIFEST=$(curl -sf \
                  -H "Authorization: Bearer ${AUTH}" \
                  -H "Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json" \
                  "https://ghcr.io/v2/${OWNER}/ph-intercept/manifests/${DIGEST}")
                if [ -z "${MANIFEST}" ]; then
                  echo "ABORT"
                  exit 1
                fi
                printf '%s\n' "${MANIFEST}" | jq -r '.manifests[]?.digest // empty' 2>/dev/null
              done
          )

          if printf '%s\n' "${PROTECTED}" | grep -q "^ABORT$"; then
            echo "Manifest fetch failed; skipping cleanup."
            exit 0
          fi

          PROTECTED=$(printf '%s\n' "${PROTECTED}" | sort -u)

          gh api --paginate "/users/${OWNER}/packages/container/ph-intercept/versions" \
            --jq '.[] | select(.metadata.container.tags | length == 0) | "\(.name) \(.id)"' \
          | while read -r DIGEST ID; do
              if ! printf '%s\n' "${PROTECTED}" | grep -qF "${DIGEST}"; then
                gh api --method DELETE \
                  "/users/${OWNER}/packages/container/ph-intercept/versions/${ID}" \
                  && echo "Deleted: ${ID} (${DIGEST})" || true
              fi
            done
