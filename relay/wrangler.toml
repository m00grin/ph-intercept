name            = "intercept-relay"
main            = "src/index.ts"
compatibility_date = "2026-05-01"
workers_dev  = false
preview_urls = false

[[durable_objects.bindings]]
name       = "RELAY"
class_name = "RelaySession"

[[durable_objects.bindings]]
name       = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag         = "v1"
new_sqlite_classes = ["RelaySession"]

[[migrations]]
tag         = "v2"
new_sqlite_classes = ["RateLimiter"]

