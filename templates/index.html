<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ph-intercept</title>
  <meta name="description" content="Pi-hole network dashboard with an interceptor-class defense grid. Monitor DNS queries and block threats in real time.">
  <link rel="icon" href="/static/icons/favicon.svg" type="image/svg+xml">

  {% if bg_mode == 'starfield' %}
  <link rel="preload" href="/static/stars-lite.json" as="fetch" type="application/json" crossorigin>
  {% endif %}

  <link rel="preload" href="/static/fonts/Orbitron-Variable.woff2"     as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/static/fonts/IBMPlexMono-Regular.woff2"   as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/static/fonts/PressStart2P.woff2"          as="font" type="font/woff2" crossorigin>

  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/game.css">
</head>
<body class="pihole-mode">

<!-- BG config injected server-side so JS doesn't need a separate fetch -->
<script type="application/json" id="bg-config">{{ bg_config | tojson }}</script>
<script>window.PROVIDER = {{ provider | tojson }}; window.P2_DASHBOARD = {{ p2_dashboard | tojson }}; window.TWO_PLAYER_ENABLED = {{ two_player_enabled | tojson }};</script>

<div id="bg-image"></div>

<script>window.SKY_PRESETS = {{ sky_presets | tojson }};</script>
<script>
window.BG_CONFIG = JSON.parse(document.getElementById('bg-config').textContent);
// In-app background override. The compose/env values load as the default; a saved in-app
// choice (ph_bg) replaces the mode + sky preset before the renderers read BG_CONFIG below.
// The env stays authoritative for the image itself: bg_image is always loaded (further down),
// and the saved 'image'/CUSTOM mode only applies when an image is actually configured, so env
// deployments keep working regardless of the in-app selection. window._bgMode is the live
// source of truth the starfield/nebula loops gate on; the settings UI mutates it at runtime.
(function () {
  const cfg = window.BG_CONFIG;
  try {
    const s = JSON.parse(localStorage.getItem('ph_bg'));
    if (s) {
      if (['starfield', 'nebula', 'outrun', 'dark'].includes(s.mode)) cfg.bg_mode = s.mode;
      else if (s.mode === 'image' && cfg.bg_image) cfg.bg_mode = 'image';   // CUSTOM only if configured
      if (s.preset && window.SKY_PRESETS[s.preset]) {
        cfg.sky_ra = window.SKY_PRESETS[s.preset].ra;
        cfg.sky_dec = window.SKY_PRESETS[s.preset].dec;
        cfg.sky_preset = s.preset;
      }
    }
  } catch (e) {}
  window._bgMode = cfg.bg_mode;
})();
if (window.BG_CONFIG.bg_image) {
  const _img = window.BG_CONFIG.bg_image;
  if (_img.startsWith('/') || /^https?:\/\//i.test(_img)) {
    document.getElementById('bg-image').style.backgroundImage = 'url("' + _img.replace(/["'\\]/g, encodeURIComponent) + '")';
  }
}
</script>

<canvas id="starfield"></canvas>
<canvas id="pihole-canvas"></canvas>

<!-- Retro CRT filter; layers shown only when body.crt-on. crt-glow = additive
     phosphor glow (screen blend), crt-overlay = scanline/mask darkening (multiply). -->
<div id="crt-glow" aria-hidden="true"></div>
<div id="crt-overlay" aria-hidden="true"></div>
<!-- Transient CRT flash, transparent at rest; JS adds a class to play one shot:
     the tube warm-up / collapse when the CRT filter is switched on or off. -->
<div id="crt-power" aria-hidden="true"></div>

<div id="settings-btn">
  <span></span><span></span><span></span>
</div>

<div id="pihole-link" data-href="{{ pihole_dashboard | e }}">
  {% if provider == 'adguard' %}
  <img src="/static/icons/adguard.svg" alt="AdGuard" draggable="false">
  {% elif provider == 'technitium' %}
  <img src="/static/icons/technitium.svg" alt="Technitium" draggable="false">
  {% else %}
  <img src="/static/icons/pihole.svg" alt="Pi-hole" draggable="false">
  {% endif %}
</div>

<!-- Starfield deps (always loaded; no-ops when BG_MODE != starfield) -->
<script src="/static/js/star-catalog.js"></script>
<script src="/static/js/planets.js"></script>
<script src="/static/js/transients.js"></script>
<script src="/static/js/dso-render.js"></script>
<script src="/static/js/starfield-lite.js"></script>

<!-- Procedural bg renderers: always loaded so they can be switched on in-app; each idles
     unless its mode is active (nebula | outrun). -->
<script src="/static/js/bg-nebula.js"></script>
<script src="/static/js/bg-outrun.js"></script>

<!-- Splash runs first; calls enterPiholeMode() when animation completes -->
<script src="/static/js/splash.js"></script>

<!-- Game -->
<script src="/static/js/game-bitmaps.js"></script>
<script src="/static/js/game.js"></script>
<script src="/static/js/2p.js"></script>

</body>
</html>
